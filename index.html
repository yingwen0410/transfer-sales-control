<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移轉銷貨主控系統</title>
<style>
  :root {
    --navy:      #1a2744;
    --blue:      #2d5be3;
    --blue-lt:   #e8eeff;
    --teal:      #0d9488;
    --teal-lt:   #e6faf8;
    --amber:     #d97706;
    --amber-lt:  #fef9ec;
    --red:       #dc2626;
    --red-lt:    #fef2f2;
    --green:     #16a34a;
    --green-lt:  #f0fdf4;
    --purple:    #7c3aed;
    --purple-lt: #f5f3ff;
    --gray-50:   #f8fafc;
    --gray-100:  #f1f5f9;
    --gray-200:  #e2e8f0;
    --gray-400:  #94a3b8;
    --gray-600:  #475569;
    --gray-800:  #1e293b;
    --white:     #ffffff;
    --shadow:    0 4px 16px rgba(0,0,0,.10);
    --shadow-lg: 0 10px 40px rgba(0,0,0,.14);
    --radius:    10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  .app-header { background: var(--navy); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.25); }
  .app-header h1 { color: var(--white); font-size: 16px; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; gap: 10px; }
  .app-header h1 span.badge { background: var(--blue); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .pad-status-banner { font-size: 12px; color: rgba(255,255,255,.7); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .app-body { display: grid; grid-template-columns: 340px 1fr; gap: 0; min-height: calc(100vh - 56px); }

  .form-panel { background: var(--white); border-right: 1px solid var(--gray-200); overflow-y: auto; position: sticky; top: 56px; height: calc(100vh - 56px); }
  .form-panel-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; background: var(--white); z-index: 10; }
  .form-panel-header h2 { font-size: 14px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
  .edit-mode-tag { display: none; background: var(--amber); color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .edit-mode-tag.visible { display: inline-block; }
  .form-body { padding: 16px 24px 100px; }

  .form-section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 8px; border-bottom: 1px solid var(--gray-100); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .form-row { margin-bottom: 12px; display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: start; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--gray-600); padding-top: 8px; line-height: 1.3; }
  .form-label .req { color: var(--red); margin-left: 2px; }
  .form-label .auto { font-size: 10px; font-weight: 500; color: var(--teal); display: block; margin-top: 1px; }

  input, select {
    width: 100%; padding: 7px 10px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    font-family: inherit; font-size: 13px; color: var(--gray-800); background: var(--white);
    transition: border-color .15s, box-shadow .15s; outline: none;
  }
  input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(45,91,227,.12); }
  input.auto-field { background: var(--teal-lt); color: var(--teal); border-color: rgba(13,148,136,.2); font-weight: 600; cursor: default; }
  input.invoice-field { background: var(--red-lt); border-color: rgba(220,38,38,.25); font-weight: 600; }
  input.invoice-field:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,.12); }

  .batch-grid { display: grid; grid-template-columns: 1fr 80px; gap: 6px; margin-bottom: 6px; align-items: center; }
  .batch-label { font-size: 11px; font-weight: 600; color: var(--purple); padding: 4px 0 2px; }
  .batch-validation { margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; text-align: center; background: var(--gray-100); color: var(--gray-600); }
  .batch-validation.ok    { background: var(--green-lt); color: var(--green); }
  .batch-validation.error { background: var(--red-lt);   color: var(--red); }

  .form-footer { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--gray-100); padding: 14px 24px; display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-primary { background: var(--blue); color: white; flex: 1; justify-content: center; }
  .btn-primary:hover { background: #1e4dd4; }
  .btn-success { background: var(--green); color: white; flex: 1; justify-content: center; }
  .btn-success:hover { background: #138a3e; }
  .btn-ghost { background: var(--gray-100); color: var(--gray-600); }
  .btn-ghost:hover { background: var(--gray-200); }
  .btn-danger { background: var(--red-lt); color: var(--red); border: 1px solid rgba(220,38,38,.2); }
  .btn-danger:hover { background: var(--red); color: white; }

  .list-panel { padding: 24px 28px; overflow-y: auto; }
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
  .list-header h2 { font-size: 15px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
  .record-count { background: var(--gray-200); color: var(--gray-600); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .search-bar { display: flex; gap: 8px; flex: 1; max-width: 520px; }
  .search-bar input { flex: 1; padding: 8px 14px; border-radius: 20px; font-size: 13px; }
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-600); transition: all .15s; }
  .tab:hover { border-color: var(--blue); color: var(--blue); }
  .tab.active { background: var(--blue); color: white; border-color: var(--blue); }

  .records-list { display: flex; flex-direction: column; gap: 10px; }
  .record-card { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 16px 18px; transition: all .15s; }
  .record-card:hover { border-color: var(--blue); box-shadow: var(--shadow); }
  .record-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .record-txn { font-size: 11px; color: var(--gray-400); font-weight: 600; font-family: monospace; }
  .record-customer { font-size: 14px; font-weight: 700; color: var(--navy); }
  .record-order { font-size: 12px; color: var(--gray-600); margin-top: 1px; }
  .record-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--gray-600); margin-bottom: 10px; }
  .record-meta span { display: flex; align-items: center; gap: 4px; }
  .record-meta strong { color: var(--gray-800); font-weight: 600; }
  .batch-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .batch-pill { background: var(--purple-lt); color: var(--purple); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; font-family: monospace; }
  .pad-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .pad-badge.pending  { background: var(--amber-lt);  color: var(--amber); }
  .pad-badge.done     { background: var(--green-lt);  color: var(--green); }
  .pad-badge.running  { background: var(--blue-lt);   color: var(--blue); }
  .pad-badge.error    { background: var(--red-lt);    color: var(--red); }
  .pad-badge.modified { background: var(--amber-lt);  color: #b45309; }
  .flag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .flag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--gray-100); color: var(--gray-400); }
  .flag.done { background: var(--green-lt); color: var(--green); }
  .flag.wait { background: var(--amber-lt); color: var(--amber); }
  .record-actions { display: flex; gap: 6px; justify-content: flex-end; border-top: 1px solid var(--gray-100); padding-top: 10px; margin-top: 4px; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; transition: all .15s; display: flex; align-items: center; gap: 4px; }
  .btn-sm-edit   { background: var(--blue-lt); color: var(--blue); }
  .btn-sm-edit:hover   { background: var(--blue); color: white; }
  .btn-sm-delete { background: var(--red-lt); color: var(--red); }
  .btn-sm-delete:hover { background: var(--red); color: white; }
  .btn-sm-flag   { background: var(--teal-lt); color: var(--teal); }
  .btn-sm-flag:hover   { background: var(--teal); color: white; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--gray-400); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--gray-600); }

  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
  .toast { padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow-lg); animation: slideIn .25s ease; max-width: 340px; display: flex; align-items: center; gap: 8px; }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }
  .toast.info    { background: var(--blue); }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: var(--radius); padding: 28px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); animation: fadeUp .2s ease; }
  @keyframes fadeUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--navy); }
  .modal p  { font-size: 13px; color: var(--gray-600); line-height: 1.7; margin-bottom: 20px; }
  .modal-info { background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; font-size: 12px; line-height: 1.8; color: var(--gray-800); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .params-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100); gap: 12px; }
  .params-row:last-child { border-bottom: none; }
  .params-label { font-size: 13px; font-weight: 600; color: var(--gray-800); }
  .params-desc  { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .params-input { width: 110px; text-align: center; font-weight: 700; font-size: 14px; }
  .params-highlight { background: #fffde7; border-color: var(--amber) !important; }

  /* 主檔管理 */
  .master-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .master-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-600); transition: all .15s; }
  .master-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
  .master-panel { display: none; }
  .master-panel.active { display: block; }
  .master-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .master-table th { background: var(--gray-100); color: var(--gray-600); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 8px 10px; text-align: left; border-bottom: 1.5px solid var(--gray-200); }
  .master-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .master-table tr:hover td { background: var(--gray-50); }
  .master-empty { text-align: center; padding: 32px; color: var(--gray-400); font-size: 13px; }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 50; background: white; border: 1.5px solid var(--blue); border-radius: 6px; box-shadow: var(--shadow); max-height: 180px; overflow-y: auto; display: none; }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--gray-100); }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--blue-lt); }
  .autocomplete-sub { font-size: 11px; color: var(--gray-400); margin-top: 1px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>
    📋 移轉銷貨主控系統
    <span class="badge">v2.1</span>
  </h1>
  <div class="header-actions">
    <div class="pad-status-banner">
      <div class="dot"></div>
      PAD 自動讀取中
    </div>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" id="masterBtn">📂 主檔管理</button>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" id="paramsBtn">⚙️ 參數設定</button>
  </div>
</header>

<div class="app-body">

  <!-- ── 左側：表單 ── -->
  <div class="form-panel">
    <div class="form-panel-header">
      <h2>
        ✏️ <span id="formTitle">新增交易</span>
        <span class="edit-mode-tag" id="editModeTag">修改模式</span>
      </h2>
    </div>

    <div class="form-body">

      <!-- 客戶資訊 -->
      <div class="form-section">
        <div class="section-title">👤 客戶資訊</div>
        <div class="form-row">
          <label class="form-label">客戶名稱 <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input type="text" id="f_customer_name" placeholder="輸入或選擇客戶名稱" autocomplete="off">
            <div class="autocomplete-list" id="customer_ac" role="listbox"></div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">客戶代號 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_customer_code" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">客戶單號 <span class="req">*</span></label>
          <input type="text" id="f_customer_order_no" placeholder="例：IIP02-2402000015">
        </div>
        <div class="form-row">
          <label class="form-label">備註組合 <span class="auto">自動產生</span></label>
          <input type="text" id="f_remark" class="auto-field" readonly placeholder="—">
        </div>
      </div>

      <!-- 品號資訊 -->
      <div class="form-section">
        <div class="section-title">📦 品號資訊</div>
        <div class="form-row">
          <label class="form-label">欣家豐品號 <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input type="text" id="f_xin_part_no" placeholder="輸入品號，自動帶出鉅侖品號" autocomplete="off">
            <div class="autocomplete-list" id="part_ac" role="listbox"></div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">鉅侖品號 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_ju_part_no" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">品名 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_part_name" class="auto-field" readonly placeholder="—">
        </div>
      </div>

      <!-- 數量與單價 -->
      <div class="form-section">
        <div class="section-title">💰 數量與單價</div>
        <div class="form-row">
          <label class="form-label">訂單數量 <span class="req">*</span></label>
          <input type="number" id="f_qty" min="1" placeholder="0">
        </div>
        <div class="form-row">
          <label class="form-label">對外單價 <span class="req">*</span></label>
          <input type="number" id="f_sale_price" min="0" step="0.01" placeholder="0">
        </div>
        <div class="form-row">
          <label class="form-label">移轉比例 <span class="auto">參數帶入</span></label>
          <input type="text" id="f_transfer_ratio" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">移轉單價 <span class="auto">自動計算</span></label>
          <input type="text" id="f_transfer_price" class="auto-field" readonly placeholder="—">
        </div>
      </div>

      <!-- 日期資訊 -->
      <div class="form-section">
        <div class="section-title">📅 日期資訊</div>
        <div class="form-row">
          <label class="form-label">預交日 <span class="req">*</span></label>
          <input type="date" id="f_delivery_date">
        </div>
        <div class="form-row">
          <label class="form-label">出貨日 <span class="req">*</span></label>
          <input type="date" id="f_ship_date">
        </div>
        <div class="form-row">
          <label class="form-label">當月第一天 <span class="auto">自動計算</span></label>
          <input type="text" id="f_month_first_day" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">跨月開票</label>
          <select id="f_cross_month">
            <option value="否">否</option>
            <option value="是">是</option>
          </select>
        </div>
        <div class="form-row" id="row_invoice_date">
          <label class="form-label">發票日期</label>
          <input type="date" id="f_invoice_date">
        </div>
      </div>

      <!-- 發票資訊 -->
      <div class="form-section">
        <div class="section-title" style="color:var(--red);">🧾 發票資訊 ⚠️</div>
        <div class="form-row">
          <label class="form-label" style="color:var(--red);">發票號碼 <span class="req">*</span></label>
          <input type="text" id="f_invoice_no" class="invoice-field" placeholder="⚠️ 人工填寫，請確認紙本號碼">
        </div>
        <div class="form-row">
          <label class="form-label">發票類型</label>
          <select id="f_invoice_type">
            <option value="電子發票">電子發票</option>
            <option value="紙本發票">紙本發票</option>
          </select>
        </div>
        <div id="cross_month_hint" style="display:none;background:var(--amber-lt);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--amber);font-weight:600;margin-top:6px;"></div>
      </div>

      <!-- 批號明細 -->
      <div class="form-section">
        <div class="section-title" style="color:var(--purple);">🏷️ 批號明細（最多4批）</div>
        <div style="display:grid;grid-template-columns:1fr 80px;gap:6px;margin-bottom:4px;">
          <span style="font-size:11px;font-weight:700;color:var(--gray-400);">批號</span>
          <span style="font-size:11px;font-weight:700;color:var(--gray-400);text-align:center;">數量</span>
        </div>
        <div id="batch_rows"></div>
        <div class="batch-validation" id="batch_validation">請填寫批號與數量</div>
      </div>

    </div>

    <div class="form-footer">
      <button class="btn btn-ghost" id="clearBtn">🗑️ 清除</button>
      <button class="btn btn-success" id="submitBtn">✅ 新增到清單</button>
    </div>
  </div>

  <!-- ── 右側：清單 ── -->
  <div class="list-panel">
    <div class="list-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <h2>📋 交易清單 <span class="record-count" id="recordCount">0 筆</span></h2>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜尋客戶名稱、客戶單號、品號…">
      </div>
    </div>

    <div class="filter-tabs" style="margin-bottom:16px;">
      <button class="tab active" data-status="">全部</button>
      <button class="tab" data-status="待建單">待建單</button>
      <button class="tab" data-status="建單中">建單中</button>
      <button class="tab" data-status="已完成">已完成</button>
      <button class="tab" data-status="錯誤">錯誤</button>
      <button class="tab" data-status="待建單（已修改）">已修改</button>
    </div>

<script>
'use strict';

// ── 全域狀態 ─────────────────────────────────────────────────────────────────
let allRecords = [];
let currentParams = {};
let editingId = null;
let deleteTargetId = null;
let currentStatusFilter = '';
let PARTS_CACHE    = [];
let CUSTOMERS_CACHE = [];

// ── 輸出編碼（XSS 防護）─────────────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok && res.status !== 404 && res.status !== 409) {
    throw new Error(`HTTP ${res.status}: ${path}`);
  }
  return res.json();
}

// ── 主檔快取載入 ──────────────────────────────────────────────────────────────
async function loadMasterCache() {
  try {
    const [pd, cd] = await Promise.all([
      apiFetch('/api/parts'),
      apiFetch('/api/customers'),
    ]);
    PARTS_CACHE     = Array.isArray(pd.parts)     ? pd.parts     : [];
    CUSTOMERS_CACHE = Array.isArray(cd.customers) ? cd.customers : [];
  } catch(e) {
    console.warn('主檔快取載入失敗', e);
  }
}

// ── 初始化批號列（用 DOM API，避免 innerHTML 事件字串）────────────────────
function initBatchRows() {
  const container = document.getElementById('batch_rows');
  container.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'batch-grid';
    wrapper.style.marginBottom = '6px';

    const leftDiv = document.createElement('div');
    const lbl1 = document.createElement('div');
    lbl1.className = 'batch-label';
    lbl1.textContent = `批號 ${i}`;
    const noInput = document.createElement('input');
    noInput.type = 'text';
    noInput.id = `f_batch_no_${i}`;
    noInput.placeholder = '批號文字';
    noInput.addEventListener('input', validateBatch);
    leftDiv.appendChild(lbl1);
    leftDiv.appendChild(noInput);

    const rightDiv = document.createElement('div');
    const lbl2 = document.createElement('div');
    lbl2.className = 'batch-label';
    lbl2.style.textAlign = 'center';
    lbl2.textContent = '數量';
    const qtyInput = document.createElement('input');
    qtyInput.type = 'number';
    qtyInput.id = `f_batch_qty_${i}`;
    qtyInput.min = '0';
    qtyInput.placeholder = '0';
    qtyInput.style.textAlign = 'center';
    qtyInput.addEventListener('input', validateBatch);
    rightDiv.appendChild(lbl2);
    rightDiv.appendChild(qtyInput);

    wrapper.appendChild(leftDiv);
    wrapper.appendChild(rightDiv);
    container.appendChild(wrapper);
  }
}

// ── 表單欄位事件綁定（不用 inline onclick）───────────────────────────────────
function bindFormEvents() {
  document.getElementById('f_customer_name').addEventListener('input',  onCustomerInput);
  document.getElementById('f_customer_name').addEventListener('focus',  showCustomerDropdown);
  document.getElementById('f_customer_name').addEventListener('blur',   () => hideDropdownDelay('customer_ac'));
  document.getElementById('f_customer_order_no').addEventListener('input', updateRemark);

  document.getElementById('f_xin_part_no').addEventListener('input',  onPartNoInput);
  document.getElementById('f_xin_part_no').addEventListener('focus',  showPartDropdown);
  document.getElementById('f_xin_part_no').addEventListener('blur',   () => hideDropdownDelay('part_ac'));

  document.getElementById('f_qty').addEventListener('input', validateBatch);
  document.getElementById('f_sale_price').addEventListener('input', calcTransferPrice);
  document.getElementById('f_ship_date').addEventListener('input', onShipDateChange);
  document.getElementById('f_cross_month').addEventListener('change', onCrossMonthChange);
  document.getElementById('f_invoice_date').addEventListener('input', updateCrossMonthHint);

  document.getElementById('clearBtn').addEventListener('click', clearForm);
  document.getElementById('submitBtn').addEventListener('click', submitForm);
  document.getElementById('masterBtn').addEventListener('click', openMaster);
  document.getElementById('paramsBtn').addEventListener('click', openParams);

  document.getElementById('searchInput').addEventListener('input', filterRecords);

  // 篩選 tabs
  document.querySelectorAll('.filter-tabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentStatusFilter = this.dataset.status;
      loadRecords();
    });
  });

  // Modal 關閉
  document.getElementById('deleteCancelBtn').addEventListener('click',  () => closeModal('deleteModal'));
  document.getElementById('deleteConfirmBtn').addEventListener('click', confirmDelete);
  document.getElementById('paramsCancelBtn').addEventListener('click',  () => closeModal('paramsModal'));
  document.getElementById('paramsSaveBtn').addEventListener('click',    saveParams);
  document.getElementById('masterCloseBtn').addEventListener('click',   () => closeModal('masterModal'));

  // 主檔 tabs
  document.getElementById('tab_parts').addEventListener('click', function() { switchMasterTab('parts', this); });
  document.getElementById('tab_customers').addEventListener('click', function() { switchMasterTab('customers', this); });

  // 主檔新增按鈕
  document.getElementById('addPartBtn').addEventListener('click', addPart);
  document.getElementById('addCustomerBtn').addEventListener('click', addCustomer);

  // 主檔搜尋
  document.getElementById('parts_search').addEventListener('input', loadMasterParts);
  document.getElementById('customers_search').addEventListener('input', loadMasterCustomers);

  // 點擊 modal 背景關閉
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });
}

// ── 客戶 autocomplete ─────────────────────────────────────────────────────────
function showCustomerDropdown() {
  const q = document.getElementById('f_customer_name').value.trim().toLowerCase();
  const matches = CUSTOMERS_CACHE.filter(c =>
    !q || c.name.toLowerCase().includes(q) || (c.code || '').toLowerCase().includes(q)
  ).slice(0, 8);
  renderDropdown('customer_ac', matches.map(c => ({
    main: c.name,
    sub:  c.code ? `代號：${c.code}` : '',
    select: () => {
      document.getElementById('f_customer_name').value = c.name;
      document.getElementById('f_customer_code').value = c.code || '';
      updateRemark();
      hideDropdown('customer_ac');
    }
  })));
}

function onCustomerInput() {
  showCustomerDropdown();
  const name  = document.getElementById('f_customer_name').value.trim();
  const found = CUSTOMERS_CACHE.find(c => c.name === name);
  document.getElementById('f_customer_code').value = found ? (found.code || '') : '';
  updateRemark();
}

// ── 品號 autocomplete ─────────────────────────────────────────────────────────
function showPartDropdown() {
  const q = document.getElementById('f_xin_part_no').value.trim().toLowerCase();
  const matches = PARTS_CACHE.filter(p =>
    !q || p.xin_no.toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q)
  ).slice(0, 8);
  renderDropdown('part_ac', matches.map(p => ({
    main: p.xin_no,
    sub:  [p.name, p.spec].filter(Boolean).join('　'),
    select: () => {
      document.getElementById('f_xin_part_no').value = p.xin_no;
      document.getElementById('f_ju_part_no').value  = p.ju_no  || '';
      document.getElementById('f_part_name').value   = p.name   || '';
      hideDropdown('part_ac');
    }
  })));
}

function onPartNoInput() {
  showPartDropdown();
  const no    = document.getElementById('f_xin_part_no').value.trim();
  const found = PARTS_CACHE.find(p => p.xin_no === no);
  document.getElementById('f_ju_part_no').value = found ? (found.ju_no || '') : '';
  document.getElementById('f_part_name').value  = found ? (found.name  || '') : '';
}

// ── 安全的下拉選單渲染（用 DOM API，不用 innerHTML + onclick 字串）─────────
function renderDropdown(id, items) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  if (!items.length) { el.classList.remove('open'); return; }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.setAttribute('role', 'option');
    const mainDiv = document.createElement('div');
    mainDiv.textContent = item.main;       // textContent 自動 escape
    div.appendChild(mainDiv);
    if (item.sub) {
      const subDiv = document.createElement('div');
      subDiv.className = 'autocomplete-sub';
      subDiv.textContent = item.sub;
      div.appendChild(subDiv);
    }
    div.addEventListener('mousedown', (e) => {
      e.preventDefault();                   // 防止 blur 先觸發
      item.select();
    });
    el.appendChild(div);
  });
  el.classList.add('open');
}

function hideDropdown(id) {
  document.getElementById(id)?.classList.remove('open');
}

function hideDropdownDelay(id) {
  setTimeout(() => hideDropdown(id), 150);
}

// ── 備註組合 ─────────────────────────────────────────────────────────────────
function updateRemark() {
  const name    = document.getElementById('f_customer_name').value.trim();
  const orderNo = document.getElementById('f_customer_order_no').value.trim();
  document.getElementById('f_remark').value = (name && orderNo) ? `${name} ${orderNo}` : '';
}

// ── 移轉單價計算（修復：之前此函數定義遺失）─────────────────────────────────
function calcTransferPrice() {
  const ratio    = currentParams.transfer_ratio || 0;
  const price    = parseFloat(document.getElementById('f_sale_price').value) || 0;
  const transfer = Math.round(price * ratio);
  document.getElementById('f_transfer_price').value = transfer ? `$${transfer.toLocaleString()}` : '';
}

// ── 出貨日變動 ────────────────────────────────────────────────────────────────
function onShipDateChange() {
  const shipDate = document.getElementById('f_ship_date').value;
  if (shipDate) {
    const d     = new Date(shipDate + 'T00:00:00');
    const first = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/01`;
    document.getElementById('f_month_first_day').value = first;
    if (document.getElementById('f_cross_month').value === '否') {
      document.getElementById('f_invoice_date').value = shipDate;
    }
  }
  updateCrossMonthHint();
}

function onCrossMonthChange() {
  const isCross = document.getElementById('f_cross_month').value === '是';
  document.getElementById('row_invoice_date').style.opacity = isCross ? '1' : '.5';
  if (!isCross) {
    document.getElementById('f_invoice_date').value = document.getElementById('f_ship_date').value;
  } else {
    document.getElementById('f_invoice_date').value = '';
  }
  updateCrossMonthHint();
}

function updateCrossMonthHint() {
  const hint    = document.getElementById('cross_month_hint');
  const isCross = document.getElementById('f_cross_month').value === '是';
  const shipDate = document.getElementById('f_ship_date').value;
  const invDate  = document.getElementById('f_invoice_date').value;
  if (isCross && shipDate && invDate) {
    const sd = new Date(shipDate + 'T00:00:00');
    const id = new Date(invDate  + 'T00:00:00');
    hint.textContent = `備註提示：${sd.getMonth()+1}/${sd.getDate()} 出貨，開 ${id.getMonth()+1}月 電子發票`;
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

// ── 批號驗證 ─────────────────────────────────────────────────────────────────
function validateBatch() {
  const qty = parseInt(document.getElementById('f_qty').value) || 0;
  let total = 0;
  for (let i = 1; i <= 4; i++) {
    total += parseInt(document.getElementById(`f_batch_qty_${i}`).value) || 0;
  }
  const el = document.getElementById('batch_validation');
  if (total === 0) {
    el.className = 'batch-validation';
    el.textContent = '請填寫批號與數量';
  } else if (total === qty) {
    el.className = 'batch-validation ok';
    el.textContent = `✅ 批號合計 ${total} = 訂單數量 ${qty}`;
  } else {
    el.className = 'batch-validation error';
    el.textContent = `⚠️ 批號合計 ${total} ≠ 訂單數量 ${qty}（差 ${total - qty > 0 ? '+' : ''}${total - qty}）`;
  }
  return total === qty && total > 0;
}

// ── 取得表單資料 ──────────────────────────────────────────────────────────────
function getFormData() {
  const batches = [];
  for (let i = 1; i <= 4; i++) {
    const no  = document.getElementById(`f_batch_no_${i}`).value.trim();
    const qty = parseInt(document.getElementById(`f_batch_qty_${i}`).value) || 0;
    if (no) batches.push({ no, qty });
  }
  const ratio     = currentParams.transfer_ratio || 0;
  const salePrice = parseFloat(document.getElementById('f_sale_price').value) || 0;
  return {
    customer_name:     document.getElementById('f_customer_name').value.trim(),
    customer_code:     document.getElementById('f_customer_code').value.trim(),
    customer_order_no: document.getElementById('f_customer_order_no').value.trim(),
    remark:            document.getElementById('f_remark').value.trim(),
    xin_part_no:       document.getElementById('f_xin_part_no').value.trim(),
    ju_part_no:        document.getElementById('f_ju_part_no').value.trim(),
    part_name:         document.getElementById('f_part_name').value.trim(),
    qty:               parseInt(document.getElementById('f_qty').value) || 0,
    sale_price:        salePrice,
    transfer_ratio:    ratio,
    transfer_price:    Math.round(salePrice * ratio),
    delivery_date:     document.getElementById('f_delivery_date').value,
    ship_date:         document.getElementById('f_ship_date').value,
    month_first_day:   document.getElementById('f_month_first_day').value,
    cross_month:       document.getElementById('f_cross_month').value,
    invoice_date:      document.getElementById('f_invoice_date').value,
    invoice_no:        document.getElementById('f_invoice_no').value.trim(),
    invoice_type:      document.getElementById('f_invoice_type').value,
    batches,
    batch_total:       batches.reduce((s, b) => s + b.qty, 0),
  };
}

function validateForm(data) {
  const errors = [];
  if (!data.customer_name)     errors.push('客戶名稱');
  if (!data.customer_order_no) errors.push('客戶單號');
  if (!data.xin_part_no)       errors.push('欣家豐品號');
  if (!data.qty)               errors.push('訂單數量');
  if (!data.sale_price)        errors.push('對外單價');
  if (!data.delivery_date)     errors.push('預交日');
  if (!data.ship_date)         errors.push('出貨日');
  if (!data.invoice_no)        errors.push('發票號碼');
  if (!validateBatch())        errors.push('批號合計 ≠ 訂單數量');
  return errors;
}

async function submitForm() {
  const data   = getFormData();
  const errors = validateForm(data);
  if (errors.length) {
    showToast(`以下欄位未填或有誤：${errors.join('、')}`, 'error');
    return;
  }
  try {
    if (editingId) {
      const res = await apiFetch(`/api/records/${editingId}`, 'PUT', data);
      if (res.success) {
        showToast('✅ 修改已儲存', 'success');
        clearForm();
        loadRecords();
      } else {
        showToast('儲存失敗：' + (res.error || '未知錯誤'), 'error');
      }
    } else {
      const res = await apiFetch('/api/records', 'POST', data);
      if (res.success) {
        showToast(`✅ 新增成功：${res.record.txn_id}`, 'success');
        clearForm();
        loadRecords();
      } else {
        showToast('新增失敗：' + (res.error || '未知錯誤'), 'error');
      }
    }
  } catch(e) {
    showToast('網路錯誤，請確認伺服器是否執行中。', 'error');
  }
}

// ── 載入清單 ──────────────────────────────────────────────────────────────────
async function loadRecords() {
  try {
    const q   = document.getElementById('searchInput').value;
    const url = `/api/records?q=${encodeURIComponent(q)}&status=${encodeURIComponent(currentStatusFilter)}`;
    const data = await apiFetch(url);
    allRecords    = data.records || [];
    currentParams = data.params  || {};
    renderRecords(allRecords);
    document.getElementById('recordCount').textContent = `${allRecords.length} 筆`;
    if (currentParams.transfer_ratio !== undefined) {
      document.getElementById('f_transfer_ratio').value =
        (currentParams.transfer_ratio * 100).toFixed(1) + '%';
      calcTransferPrice();
    }
  } catch(e) {
    showToast('無法連線到伺服器，請確認 server.py 是否執行中。', 'error');
  }
}

// ── 渲染清單（XSS 安全：全部用 textContent / DOM API）────────────────────────
function renderRecords(records) {
  const list = document.getElementById('recordsList');
  list.innerHTML = '';

  if (!records.length) {
    const es  = document.createElement('div');
    es.className = 'empty-state';
    es.innerHTML = '<div class="icon">📭</div>';
    const h3 = document.createElement('h3');
    h3.textContent = '沒有資料';
    const p = document.createElement('p');
    p.textContent = '新增第一筆交易或調整搜尋條件';
    es.appendChild(h3);
    es.appendChild(p);
    list.appendChild(es);
    return;
  }

  const PAD_CLASS = {
    '待建單': 'pending', '已完成': 'done', '建單中': 'running',
    '錯誤': 'error', '待建單（已修改）': 'modified'
  };
  const FLAG_DEFS = [
    ['欣豐訂單', 'flag_xin_order'],
    ['欣豐銷貨', 'flag_xin_sale'],
    ['鉅侖採購', 'flag_ju_purchase'],
    ['鉅侖進貨', 'flag_ju_receipt'],
    ['鉅侖銷貨', 'flag_ju_sale'],
  ];

  [...records].reverse().forEach(r => {
    const card = document.createElement('div');
    card.className = 'record-card';
    card.id = `card_${r.id}`;

    // header
    const header = document.createElement('div');
    header.className = 'record-card-header';

    const infoDiv = document.createElement('div');
    const txnDiv  = document.createElement('div');
    txnDiv.className = 'record-txn';
    txnDiv.textContent = `${r.txn_id} · ${r.created_at}`;
    const custDiv = document.createElement('div');
    custDiv.className = 'record-customer';
    custDiv.textContent = r.customer_name;
    const orderDiv = document.createElement('div');
    orderDiv.className = 'record-order';
    orderDiv.textContent = r.customer_order_no;
    infoDiv.appendChild(txnDiv);
    infoDiv.appendChild(custDiv);
    infoDiv.appendChild(orderDiv);

    const badge = document.createElement('span');
    badge.className = `pad-badge ${PAD_CLASS[r.pad_status] || 'pending'}`;
    badge.textContent = r.pad_status;
    header.appendChild(infoDiv);
    header.appendChild(badge);
    card.appendChild(header);

    // meta
    const meta = document.createElement('div');
    meta.className = 'record-meta';
    [
      ['品號', r.xin_part_no],
      ['數量', r.qty],
      ['移轉單價', `$${(r.transfer_price||0).toLocaleString()}`],
      ['出貨日', r.ship_date || '—'],
    ].forEach(([lbl, val]) => {
      const sp = document.createElement('span');
      sp.textContent = `${lbl} `;
      const strong = document.createElement('strong');
      strong.textContent = val;
      sp.appendChild(strong);
      meta.appendChild(sp);
    });
    if (r.cross_month === '是') {
      const sp = document.createElement('span');
      sp.style.cssText = 'color:var(--amber);font-weight:700;';
      sp.textContent = '⚠️ 跨月開票';
      meta.appendChild(sp);
    }
    card.appendChild(meta);

    // 批號
    const batchPills = (r.batches || []).filter(b => b.no);
    if (batchPills.length) {
      const pills = document.createElement('div');
      pills.className = 'batch-pills';
      batchPills.forEach(b => {
        const pill = document.createElement('span');
        pill.className = 'batch-pill';
        pill.textContent = `${b.no} ×${b.qty}`;
        pills.appendChild(pill);
      });
      card.appendChild(pills);
    }

    // 旗標
    const flagRow = document.createElement('div');
    flagRow.className = 'flag-row';
    FLAG_DEFS.forEach(([label, key]) => {
      const val = r[key] || '';
      const f   = document.createElement('span');
      f.className = `flag${val === '是' ? ' done' : val === '待人工' ? ' wait' : ''}`;
      f.textContent = label + (val === '是' ? ' ✓' : val === '待人工' ? ' ⏳' : '');
      flagRow.appendChild(f);
    });
    card.appendChild(flagRow);

    // 操作按鈕
    const actions = document.createElement('div');
    actions.className = 'record-actions';

    const flagBtn = document.createElement('button');
    flagBtn.className = 'btn-sm btn-sm-flag';
    flagBtn.textContent = r.flag_ju_sale === '是' ? '✓ 鉅侖銷貨已完成' : '⏳ 確認鉅侖銷貨';
    flagBtn.addEventListener('click', () => toggleJuSaleFlag(r.id, r.flag_ju_sale));

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-sm btn-sm-edit';
    editBtn.textContent = '✏️ 修改';
    editBtn.addEventListener('click', () => loadEdit(r.id));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-sm btn-sm-delete';
    delBtn.textContent = '🗑️ 刪除';
    delBtn.addEventListener('click', () => openDeleteModal(r.id));

    actions.appendChild(flagBtn);
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);
    list.appendChild(card);
  });
}

// ── 載入修改 ─────────────────────────────────────────────────────────────────
async function loadEdit(id) {
  try {
    const r = await apiFetch(`/api/records/${id}`);
    if (r.error) { showToast('找不到此筆資料', 'error'); return; }

    editingId = id;
    document.getElementById('formTitle').textContent = '修改交易';
    document.getElementById('editModeTag').classList.add('visible');
    document.getElementById('submitBtn').textContent  = '💾 儲存修改';
    document.getElementById('submitBtn').className    = 'btn btn-primary';

    const fields = {
      f_customer_name: r.customer_name, f_customer_code: r.customer_code,
      f_customer_order_no: r.customer_order_no, f_remark: r.remark,
      f_xin_part_no: r.xin_part_no, f_ju_part_no: r.ju_part_no,
      f_part_name: r.part_name, f_qty: r.qty, f_sale_price: r.sale_price,
      f_delivery_date: r.delivery_date, f_ship_date: r.ship_date,
      f_month_first_day: r.month_first_day,
      f_invoice_date: r.invoice_date, f_invoice_no: r.invoice_no,
    };
    Object.entries(fields).forEach(([id, val]) => {
      document.getElementById(id).value = val ?? '';
    });
    document.getElementById('f_transfer_ratio').value =
      ((r.transfer_ratio || 0) * 100).toFixed(1) + '%';
    document.getElementById('f_transfer_price').value =
      r.transfer_price ? `$${r.transfer_price.toLocaleString()}` : '';
    document.getElementById('f_cross_month').value   = r.cross_month || '否';
    document.getElementById('f_invoice_type').value  = r.invoice_type || '電子發票';

    (r.batches || []).forEach((b, i) => {
      if (i < 4) {
        document.getElementById(`f_batch_no_${i+1}`).value  = b.no  || '';
        document.getElementById(`f_batch_qty_${i+1}`).value = b.qty || '';
      }
    });
    validateBatch();
    updateCrossMonthHint();

    if (r.pad_status === '已完成') {
      showToast('⚠️ 此筆 PAD 已完成，修改後 ERP 不會自動更新，請留意。', 'info');
    }
    document.querySelector('.form-panel').scrollTo({ top: 0, behavior: 'smooth' });
  } catch(e) {
    showToast('載入失敗，請重試。', 'error');
  }
}

function clearForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = '新增交易';
  document.getElementById('editModeTag').classList.remove('visible');
  document.getElementById('submitBtn').textContent = '✅ 新增到清單';
  document.getElementById('submitBtn').className   = 'btn btn-success';

  const textIds = [
    'f_customer_name','f_customer_code','f_customer_order_no','f_remark',
    'f_xin_part_no','f_ju_part_no','f_part_name','f_qty','f_sale_price',
    'f_transfer_price','f_delivery_date','f_ship_date','f_month_first_day',
    'f_invoice_date','f_invoice_no',
  ];
  textIds.forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f_cross_month').value  = '否';
  document.getElementById('f_invoice_type').value = '電子發票';
  document.getElementById('cross_month_hint').style.display = 'none';

  }

// ── 刪除 ──────────────────────────────────────────────────────────────────────
function openDeleteModal(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;
  deleteTargetId = id;

  // 用 textContent 填入，避免 XSS
  const info = document.getElementById('deleteInfo');
  info.innerHTML = '';
  [
    ['列號', r.seq],
    ['客戶', r.customer_name],
    ['客戶單號', r.customer_order_no],
    ['PAD 狀態', r.pad_status],
  ].forEach(([lbl, val]) => {
    const line = document.createElement('div');
    const strong = document.createElement('strong');
    strong.textContent = lbl;
    line.appendChild(strong);
    line.appendChild(document.createTextNode('：' + (val ?? '')));
    info.appendChild(line);
  });

  const warn = document.getElementById('deleteWarning');
  if (r.pad_status === '已完成') {
    warn.textContent = '⚠️ 此筆 PAD 狀態為「已完成」，ERP 中可能已建立對應單據，請確認 ERP 是否需同步處理。';
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
  document.getElementById('deleteModal').classList.add('open');
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  try {
    const res = await apiFetch(`/api/records/${deleteTargetId}`, 'DELETE');
    closeModal('deleteModal');
    if (res.success) {
      showToast('已刪除此筆資料', 'success');
      loadRecords();
    } else {
      showToast('刪除失敗：' + (res.error || ''), 'error');
    }
  } catch(e) {
    showToast('刪除失敗，請重試。', 'error');
  }
  deleteTargetId = null;
}

// ── 鉅侖銷貨旗標快速切換 ─────────────────────────────────────────────────────
async function toggleJuSaleFlag(id, current) {
  const newVal = current === '是' ? '待人工' : '是';
  try {
    const res = await apiFetch(`/api/records/${id}`, 'PUT', { flag_ju_sale: newVal });

      loadRecords();
    }
  } catch(e) {
    showToast('更新失敗，請重試。', 'error');
  }
}

  { key: 'ju_pur_type',     label: '鉅侖採購單別',    desc: '材料採購單（移轉用）' },
  { key: 'ju_rec_type',     label: '鉅侖進貨單別',    desc: '材料進貨單（移轉用）' },
  { key: 'ju_sale_type',    label: '鉅侖銷貨單別',    desc: '材料銷貨單（特材）' },
  { key: 'xin_to_ju_code',  label: '欣家豐→鉅侖代號', desc: '欣家豐訂/銷單中鉅侖的客戶代號' },
  { key: 'ju_to_xin_code',  label: '鉅侖→欣家豐代號', desc: '鉅侖採/進單中欣家豐的供應商代號' },
];
const PARAM_DEFAULTS = {
  transfer_ratio: 0.22, xin_order_type: '221A', xin_sale_type: '231A',
  ju_pur_type: '331A', ju_rec_type: '341A', ju_sale_type: '2312',
  xin_to_ju_code: 'T99001', ju_to_xin_code: 'B0306'
};

async function openParams() {
  try {
    const params = await apiFetch('/api/params');
    const body   = document.getElementById('paramsBody');
    body.innerHTML = '';
    PARAM_DEFS.forEach(d => {
      const row = document.createElement('div');
      row.className = 'params-row';
      const textDiv = document.createElement('div');
      const lbl  = document.createElement('div');
      lbl.className = 'params-label';
      lbl.textContent = d.label;
      const desc = document.createElement('div');
      desc.className = 'params-desc';
      desc.textContent = d.desc;
      textDiv.appendChild(lbl);
      textDiv.appendChild(desc);

      const input = document.createElement('input');
      input.type  = 'text';
      input.className = 'params-input' + (d.highlight ? ' params-highlight' : '');
      input.id    = `param_${d.key}`;
      input.value = params[d.key] !== undefined ? params[d.key] : PARAM_DEFAULTS[d.key];

      row.appendChild(textDiv);
      row.appendChild(input);
      body.appendChild(row);
    });
    document.getElementById('paramsModal').classList.add('open');
  } catch(e) {
    showToast('無法載入參數設定。', 'error');
  }
}

async function saveParams() {
  const bodyData = {};
  PARAM_DEFS.forEach(d => {
    const val = document.getElementById(`param_${d.key}`)?.value;
    if (val !== undefined) {
      bodyData[d.key] = d.key === 'transfer_ratio' ? parseFloat(val) : val;
    }
  });
  try {
    const res = await apiFetch('/api/params', 'POST', bodyData);
    if (res.success) {
      currentParams = res.params;
      closeModal('paramsModal');
      showToast('✅ 參數已儲存', 'success');
      document.getElementById('f_transfer_ratio').value =
        (currentParams.transfer_ratio * 100).toFixed(1) + '%';
      calcTransferPrice();
    }
  } catch(e) {
    showToast('儲存失敗，請重試。', 'error');
  }
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id)?.classList.remove('open');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const t     = document.createElement('div');
  t.className = `toast ${type}`;
  const icon  = document.createElement('span');
  icon.textContent = icons[type] || '';
  const text  = document.createElement('span');
  text.textContent = msg;             // textContent 防 XSS
  t.appendChild(icon);
  t.appendChild(text);
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── 初始化 ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initBatchRows();
  bindFormEvents();
  loadMasterCache();
  loadRecords();
  setInterval(loadRecords,     30000);
  setInterval(loadMasterCache, 120000);
});
</script>
</body>
