<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移轉銷貨主控系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --navy:      #1a2744;
    --navy-mid:  #243358;
    --blue:      #2d5be3;
    --blue-lt:   #e8eeff;
    --teal:      #0d9488;
    --teal-lt:   #e6faf8;
    --amber:     #d97706;
    --amber-lt:  #fef9ec;
    --red:       #dc2626;
    --red-lt:    #fef2f2;
    --green:     #16a34a;
    --green-lt:  #f0fdf4;
    --purple:    #7c3aed;
    --purple-lt: #f5f3ff;
    --gray-50:   #f8fafc;
    --gray-100:  #f1f5f9;
    --gray-200:  #e2e8f0;
    --gray-400:  #94a3b8;
    --gray-600:  #475569;
    --gray-800:  #1e293b;
    --white:     #ffffff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow:    0 4px 16px rgba(0,0,0,.10);
    --shadow-lg: 0 10px 40px rgba(0,0,0,.14);
    --radius:    10px;
    --radius-sm: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .app-header {
    background: var(--navy);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .app-header h1 {
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-header h1 span.badge {
    background: var(--blue);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0;
  }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .pad-status-banner {
    font-size: 12px;
    color: rgba(255,255,255,.7);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  .app-body {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    min-height: calc(100vh - 56px);
  }

  /* ── Left panel: Form ── */
  .form-panel {
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    overflow-y: auto;
    padding: 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
  }
  .form-panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gray-100);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }
  .form-panel-header h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .edit-mode-tag {
    display: none;
    background: var(--amber);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .edit-mode-tag.visible { display: inline-block; }

  .form-body { padding: 16px 24px 100px; }

  /* Section headers in form */
  .form-section {
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 0 8px;
    border-bottom: 1px solid var(--gray-100);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Form rows */
  .form-row {
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 8px;
    align-items: start;
  }
  .form-row.full { grid-template-columns: 1fr; }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    padding-top: 8px;
    line-height: 1.3;
  }
  .form-label .req { color: var(--red); margin-left: 2px; }
  .form-label .auto {
    font-size: 10px;
    font-weight: 500;
    color: var(--teal);
    display: block;
    margin-top: 1px;
  }

  input, select, textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    color: var(--gray-800);
    background: var(--white);
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(45,91,227,.12);
  }
  input.auto-field {
    background: var(--teal-lt);
    color: var(--teal);
    border-color: rgba(13,148,136,.2);
    font-weight: 600;
    cursor: default;
  }
  input.invoice-field {
    background: var(--red-lt);
    border-color: rgba(220,38,38,.25);
    font-weight: 600;
  }
  input.invoice-field:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(220,38,38,.12);
  }

  /* Batch section */
  .batch-grid {
    display: grid;
    grid-template-columns: 1fr 80px;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .batch-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--purple);
    padding: 4px 0 2px;
  }
  .batch-validation {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .batch-validation.ok    { background: var(--green-lt);  color: var(--green); }
  .batch-validation.error { background: var(--red-lt);    color: var(--red); }

  /* Form footer buttons */
  .form-footer {
    position: sticky;
    bottom: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-100);
    padding: 14px 24px;
    display: flex;
    gap: 8px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--blue);
    color: white;
    flex: 1;
    justify-content: center;
  }
  .btn-primary:hover { background: #1e4dd4; transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-success {
    background: var(--green);
    color: white;
    flex: 1;
    justify-content: center;
  }
  .btn-success:hover { background: #138a3e; transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-ghost {
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .btn-ghost:hover { background: var(--gray-200); }
  .btn-danger {
    background: var(--red-lt);
    color: var(--red);
    border: 1px solid rgba(220,38,38,.2);
  }
  .btn-danger:hover { background: var(--red); color: white; }

  /* ── Right panel: List ── */
  .list-panel {
    padding: 24px 28px;
    overflow-y: auto;
  }
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .list-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .record-count {
    background: var(--gray-200);
    color: var(--gray-600);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .search-bar {
    display: flex;
    gap: 8px;
    flex: 1;
    max-width: 520px;
  }
  .search-bar input {
    flex: 1;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
  }
  .filter-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    transition: all .15s;
  }
  .tab:hover { border-color: var(--blue); color: var(--blue); }
  .tab.active { background: var(--blue); color: white; border-color: var(--blue); }

  /* Record cards */
  .records-list { display: flex; flex-direction: column; gap: 10px; }
  .record-card {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: all .15s;
    cursor: default;
  }
  .record-card:hover { border-color: var(--blue); box-shadow: var(--shadow); }
  .record-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .record-txn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 600;
  }
  .record-customer {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }
  .record-order {
    font-size: 12px;
    color: var(--gray-600);
    margin-top: 1px;
  }
  .record-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--gray-600);
    margin-bottom: 10px;
  }
  .record-meta span { display: flex; align-items: center; gap: 4px; }
  .record-meta strong { color: var(--gray-800); font-weight: 600; }

  /* Batch pills */
  .batch-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .batch-pill {
    background: var(--purple-lt);
    color: var(--purple);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  /* PAD status */
  .pad-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .pad-badge.pending   { background: var(--amber-lt);  color: var(--amber); }
  .pad-badge.done      { background: var(--green-lt);  color: var(--green); }
  .pad-badge.running   { background: var(--blue-lt);   color: var(--blue); }
  .pad-badge.error     { background: var(--red-lt);    color: var(--red); }
  .pad-badge.modified  { background: var(--amber-lt);  color: #b45309; }
  .pad-badge.human     { background: var(--purple-lt); color: var(--purple); }

  /* Flag row */
  .flag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .flag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--gray-100);
    color: var(--gray-400);
  }
  .flag.done { background: var(--green-lt); color: var(--green); }
  .flag.wait { background: var(--amber-lt); color: var(--amber); }

  /* Card actions */
  .record-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    border-top: 1px solid var(--gray-100);
    padding-top: 10px;
    margin-top: 4px;
  }
  .btn-sm {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-sm-edit   { background: var(--blue-lt); color: var(--blue); }
  .btn-sm-edit:hover   { background: var(--blue); color: white; }
  .btn-sm-delete { background: var(--red-lt); color: var(--red); }
  .btn-sm-delete:hover { background: var(--red); color: white; }
  .btn-sm-flag   { background: var(--teal-lt); color: var(--teal); }
  .btn-sm-flag:hover   { background: var(--teal); color: white; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--gray-400);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--gray-600); }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }
  .toast {
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    color: white;
    box-shadow: var(--shadow-lg);
    animation: slideIn .25s ease;
    max-width: 340px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }
  .toast.info    { background: var(--blue); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 420px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--navy); }
  .modal p  { font-size: 13px; color: var(--gray-600); line-height: 1.7; margin-bottom: 20px; }
  .modal-info {
    background: var(--gray-50);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--gray-800);
  }
  .modal-info strong { color: var(--navy); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Params modal */
  .params-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--gray-100);
    gap: 12px;
  }
  .params-row:last-child { border-bottom: none; }
  .params-label { font-size: 13px; font-weight: 600; color: var(--gray-800); }
  .params-desc  { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .params-input { width: 110px; text-align: center; font-weight: 700; font-size: 14px; }
  .params-highlight { background: #fffde7; border-color: var(--amber) !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

  .divider { height: 1px; background: var(--gray-100); margin: 16px 0; }

  /* ── 主檔管理 modal ── */
  .master-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .master-tab {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--gray-200);
    background: var(--white); color: var(--gray-600); transition: all .15s;
  }
  .master-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
  .master-panel { display: none; }
  .master-panel.active { display: block; }
  .master-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .master-table th {
    background: var(--gray-100); color: var(--gray-600); font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    padding: 8px 10px; text-align: left; border-bottom: 1.5px solid var(--gray-200);
  }
  .master-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .master-table tr:hover td { background: var(--gray-50); }
  .master-add-row { display: grid; gap: 8px; margin-top: 12px; }
  .master-add-row input {
    padding: 7px 10px; border: 1.5px solid var(--gray-200); border-radius: 6px;
    font-size: 13px; font-family: inherit;
  }
  .master-add-row input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(45,91,227,.12); }
  .master-empty { text-align: center; padding: 32px; color: var(--gray-400); font-size: 13px; }

  /* ── Autocomplete dropdown ── */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: white; border: 1.5px solid var(--blue); border-radius: 6px;
    box-shadow: var(--shadow); max-height: 180px; overflow-y: auto;
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 8px 12px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--blue-lt); }
  .autocomplete-sub { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <h1>
    📋 移轉銷貨主控系統
    <span class="badge">v2.0</span>
  </h1>
  <div class="header-actions">
    <div class="pad-status-banner">
      <div class="dot"></div>
      PAD 自動讀取中
    </div>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="openMaster()">📂 主檔管理</button>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="openParams()">⚙️ 參數設定</button>
  </div>
</header>

<div class="app-body">

  <!-- ── Left: Form panel ── -->
  <div class="form-panel">
    <div class="form-panel-header">
      <h2>
        ✏️ <span id="formTitle">新增交易</span>
        <span class="edit-mode-tag" id="editModeTag">修改模式</span>
      </h2>
    </div>

    <div class="form-body">

      <!-- 客戶資訊 -->
      <div class="form-section">
        <div class="section-title">👤 客戶資訊</div>

        <div class="form-row">
          <label class="form-label">客戶名稱 <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input type="text" id="f_customer_name" placeholder="輸入或選擇客戶名稱"
              oninput="onCustomerInput()" autocomplete="off"
              onfocus="showCustomerDropdown()" onblur="setTimeout(()=>closeDropdown('customer_ac'),150)">
            <div class="autocomplete-list" id="customer_ac"></div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">客戶代號 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_customer_code" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">客戶單號 <span class="req">*</span></label>
          <input type="text" id="f_customer_order_no" placeholder="例：IIP02-2402000015" oninput="updateRemark()">
        </div>
        <div class="form-row">
          <label class="form-label">備註組合 <span class="auto">自動產生</span></label>
          <input type="text" id="f_remark" class="auto-field" readonly placeholder="—">
        </div>
      </div>

      <!-- 品號資訊 -->
      <div class="form-section">
        <div class="section-title">📦 品號資訊</div>
        <div class="form-row">
          <label class="form-label">欣家豐品號 <span class="req">*</span></label>
          <div class="autocomplete-wrap">
            <input type="text" id="f_xin_part_no" placeholder="輸入品號，自動帶出鉅侖品號"
              oninput="onPartNoInput()" autocomplete="off"
              onfocus="showPartDropdown()" onblur="setTimeout(()=>closeDropdown('part_ac'),150)">
            <div class="autocomplete-list" id="part_ac"></div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">鉅侖品號 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_ju_part_no" class="auto-field" readonly placeholder="—">
        </div>
        <div class="form-row">
          <label class="form-label">品名 <span class="auto">自動帶出</span></label>
          <input type="text" id="f_part_name" class="auto-field" readonly placeholder="—">
        </div>
      </div>

      <!-- 數量與單價 -->
      <div class="form-section">

<script>
const API = '';  // 同源，不需要前綴
let allRecords = [];
let currentParams = {};
let editingId = null;
let deleteTargetId = null;
let currentStatusFilter = '';

// ── 主檔快取（從 API 載入，不再寫死）────────────────────────────────────────
let PARTS_CACHE    = [];  // [{id, xin_no, ju_no, name, spec}]
let CUSTOMERS_CACHE = []; // [{id, name, code}]

async function loadMasterCache() {
  try {
    const [pd, cd] = await Promise.all([
      apiFetch('/api/parts'),
      apiFetch('/api/customers'),
    ]);
    PARTS_CACHE     = pd.parts    || [];
    CUSTOMERS_CACHE = cd.customers || [];
  } catch(e) {
    console.warn('主檔快取載入失敗', e);
  }
}

// ── 初始化批號列 ──────────────────────────────────────────────────────────────
function initBatchRows() {
  const container = document.getElementById('batch_rows');
  container.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    container.innerHTML += `
      <div class="batch-grid" style="margin-bottom:6px;">
        <div>
          <div class="batch-label">批號 ${i}</div>
          <input type="text" id="f_batch_no_${i}" placeholder="批號文字" oninput="validateBatch()">
        </div>
        <div>
          <div class="batch-label" style="text-align:center;">數量</div>
          <input type="number" id="f_batch_qty_${i}" min="0" placeholder="0" oninput="validateBatch()" style="text-align:center;">
        </div>
      </div>`;
  }
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

// ── 載入清單 ──────────────────────────────────────────────────────────────────
async function loadRecords() {
  try {
    const q = document.getElementById('searchInput').value;
    const url = `/api/records?q=${encodeURIComponent(q)}&status=${encodeURIComponent(currentStatusFilter)}`;
    const data = await apiFetch(url);
    allRecords = data.records || [];
    currentParams = data.params || {};
    renderRecords(allRecords);
    document.getElementById('recordCount').textContent = `${allRecords.length} 筆`;
    // 同步移轉比例到表單
    if (currentParams.transfer_ratio !== undefined) {
      document.getElementById('f_transfer_ratio').value =
        (currentParams.transfer_ratio * 100).toFixed(1) + '%';
      calcTransferPrice();
    }
  } catch(e) {
    showToast('無法連線到伺服器，請確認 server.py 是否執行中。', 'error');
  }
}

// ── 渲染清單 ──────────────────────────────────────────────────────────────────
function renderRecords(records) {
  const list = document.getElementById('recordsList');
  if (!records.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>沒有資料</h3><p>新增第一筆交易或調整搜尋條件</p></div>`;
    return;
  }
  list.innerHTML = records.slice().reverse().map(r => {
    const padClass = {
      '待建單': 'pending', '已完成': 'done', '建單中': 'running',
      '錯誤': 'error', '待建單（已修改）': 'modified'
    }[r.pad_status] || 'pending';

    const batches = (r.batches || []).filter(b => b.no).map(b =>
      `<span class="batch-pill">${b.no} ×${b.qty}</span>`).join('');

    const flags = [
      ['欣豐訂單', r.flag_xin_order],
      ['欣豐銷貨', r.flag_xin_sale],
      ['鉅侖採購', r.flag_ju_purchase],
      ['鉅侖進貨', r.flag_ju_receipt],
      ['鉅侖銷貨', r.flag_ju_sale],
    ].map(([label, val]) => {
      const cls = val === '是' ? 'done' : val === '待人工' ? 'wait' : '';
      return `<span class="flag ${cls}">${label}${val === '是' ? ' ✓' : val === '待人工' ? ' ⏳' : ''}</span>`;
    }).join('');

    return `
    <div class="record-card" id="card_${r.id}">
      <div class="record-card-header">
        <div>
          <div class="record-txn">${r.txn_id} &nbsp;·&nbsp; ${r.created_at}</div>
          <div class="record-customer">${r.customer_name}</div>
          <div class="record-order">${r.customer_order_no}</div>
        </div>
        <span class="pad-badge ${padClass}">${r.pad_status}</span>
      </div>
      <div class="record-meta">
        <span>品號 <strong>${r.xin_part_no}</strong></span>
        <span>數量 <strong>${r.qty}</strong></span>
        <span>移轉單價 <strong>$${(r.transfer_price||0).toLocaleString()}</strong></span>
        <span>出貨日 <strong>${r.ship_date || '—'}</strong></span>
        ${r.cross_month === '是' ? '<span style="color:var(--amber);font-weight:700;">⚠️ 跨月開票</span>' : ''}
      </div>
      ${batches ? `<div class="batch-pills">${batches}</div>` : ''}
      <div class="flag-row">${flags}</div>
      <div class="record-actions">
        <button class="btn-sm btn-sm-flag" onclick="toggleJuSaleFlag('${r.id}','${r.flag_ju_sale}')">
          ${r.flag_ju_sale === '是' ? '✓ 鉅侖銷貨已完成' : '⏳ 確認鉅侖銷貨'}
        </button>
        <button class="btn-sm btn-sm-edit" onclick="loadEdit('${r.id}')">✏️ 修改</button>
        <button class="btn-sm btn-sm-delete" onclick="openDeleteModal('${r.id}')">🗑️ 刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ── 篩選與搜尋 ───────────────────────────────────────────────────────────────
function filterRecords() { loadRecords(); }

function setStatusFilter(el, status) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentStatusFilter = status;
  loadRecords();
}

// ── 客戶自動完成 ───────────────────────────────────────────────────────────────
function showCustomerDropdown() {
  const q = document.getElementById('f_customer_name').value.trim().toLowerCase();
  const list = CUSTOMERS_CACHE.filter(c =>
    !q || c.name.toLowerCase().includes(q) || (c.code || '').toLowerCase().includes(q));
  renderDropdown('customer_ac', list.slice(0,8).map(c => ({
    main: c.name, sub: c.code ? `代號：${c.code}` : '',
    onClick: () => selectCustomer(c)
  })));
}

function selectCustomer(c) {
  document.getElementById('f_customer_name').value  = c.name;
  document.getElementById('f_customer_code').value  = c.code || '';
  closeDropdown('customer_ac');
  updateRemark();
}

function onCustomerInput() {
  showCustomerDropdown();
  // 嘗試精確比對
  const name = document.getElementById('f_customer_name').value.trim();
  const found = CUSTOMERS_CACHE.find(c => c.name === name);
  document.getElementById('f_customer_code').value = found ? (found.code || '') : '';
  updateRemark();
}

// ── 品號自動完成 ───────────────────────────────────────────────────────────────
function showPartDropdown() {
  const q = document.getElementById('f_xin_part_no').value.trim().toLowerCase();
  const list = PARTS_CACHE.filter(p =>
    !q || p.xin_no.toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q));
  renderDropdown('part_ac', list.slice(0,8).map(p => ({
    main: p.xin_no, sub: [p.name, p.spec].filter(Boolean).join('　'),
    onClick: () => selectPart(p)
  })));
}

function selectPart(p) {
  document.getElementById('f_xin_part_no').value = p.xin_no;
  document.getElementById('f_ju_part_no').value  = p.ju_no  || '';
  document.getElementById('f_part_name').value   = p.name   || '';
  closeDropdown('part_ac');
}

function onPartNoInput() {
  showPartDropdown();
  // 嘗試精確比對
  const no    = document.getElementById('f_xin_part_no').value.trim();
  const found = PARTS_CACHE.find(p => p.xin_no === no);
  document.getElementById('f_ju_part_no').value = found ? (found.ju_no || '') : '';
  document.getElementById('f_part_name').value  = found ? (found.name  || '') : '';
}

// ── 通用下拉選單渲染（用全域回呼表，避免特殊字元炸掉）────────────────────────
const _dropdownCallbacks = {};

function renderDropdown(id, items) {
  const el = document.getElementById(id);
  if (!items.length) { el.classList.remove('open'); return; }
  // 清掉舊的回呼
  Object.keys(_dropdownCallbacks).filter(k => k.startsWith(id + '_')).forEach(k => delete _dropdownCallbacks[k]);
  el.innerHTML = items.map((item, i) => {
    const cbKey = `${id}_${i}`;
    _dropdownCallbacks[cbKey] = item.onClick;
    return `
    <div class="autocomplete-item" onmousedown="_dropdownCallbacks['${cbKey}']()">
      <div>${item.main}</div>
      ${item.sub ? `<div class="autocomplete-sub">${item.sub}</div>` : ''}
    </div>`;
  }).join('');
  el.classList.add('open');
}

function closeDropdown(id) {
  document.getElementById(id)?.classList.remove('open');
}

// ── 備註組合 ─────────────────────────────────────────────────────────────────
function updateRemark() {
  const name    = document.getElementById('f_customer_name').value.trim();
  const orderNo = document.getElementById('f_customer_order_no').value.trim();
  document.getElementById('f_remark').value = (name && orderNo) ? `${name} ${orderNo}` : '';
}


  const ratio = currentParams.transfer_ratio || 0;
  const price = parseFloat(document.getElementById('f_sale_price').value) || 0;
  const transfer = Math.round(price * ratio);
  document.getElementById('f_transfer_price').value = transfer ? `$${transfer.toLocaleString()}` : '';
}

function onShipDateChange() {
  const shipDate = document.getElementById('f_ship_date').value;
  if (shipDate) {
    const d = new Date(shipDate);
    const first = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/01`;
    document.getElementById('f_month_first_day').value = first;
    // 若非跨月，發票日期同出貨日
    if (document.getElementById('f_cross_month').value === '否') {
      document.getElementById('f_invoice_date').value = shipDate;
    }
  }
  updateCrossMonthHint();
}

function onCrossMonthChange() {
  const isCross = document.getElementById('f_cross_month').value === '是';
  document.getElementById('row_invoice_date').style.opacity = isCross ? '1' : '.5';
  if (!isCross) {
    document.getElementById('f_invoice_date').value = document.getElementById('f_ship_date').value;
  } else {
    document.getElementById('f_invoice_date').value = '';
  }
  updateCrossMonthHint();
}

function updateCrossMonthHint() {
  const hint = document.getElementById('cross_month_hint');
  const isCross = document.getElementById('f_cross_month').value === '是';
  const shipDate = document.getElementById('f_ship_date').value;
  const invDate  = document.getElementById('f_invoice_date').value;
  if (isCross && shipDate && invDate) {
    const sd = new Date(shipDate), id = new Date(invDate);
    const sm = `${sd.getMonth()+1}/${sd.getDate()}`;
    const im = `${id.getMonth()+1}月`;
    hint.textContent = `備註提示：${sm} 出貨，開 ${im} 電子發票`;
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

function validateBatch() {
  const qty = parseInt(document.getElementById('f_qty').value) || 0;
  let total = 0;
  for (let i = 1; i <= 4; i++) {
    total += parseInt(document.getElementById(`f_batch_qty_${i}`).value) || 0;
  }
  const el = document.getElementById('batch_validation');
  if (total === 0) {
    el.className = 'batch-validation';
    el.textContent = '請填寫批號與數量';
  } else if (total === qty) {
    el.className = 'batch-validation ok';
    el.textContent = `✅ 批號合計 ${total} = 訂單數量 ${qty}`;
  } else {
    el.className = 'batch-validation error';
    el.textContent = `⚠️ 批號合計 ${total} ≠ 訂單數量 ${qty}（差 ${total - qty}）`;
  }
  return total === qty && total > 0;
}

// ── 新增 / 修改 送出 ──────────────────────────────────────────────────────────
function getFormData() {
  const batches = [];
  for (let i = 1; i <= 4; i++) {
    const no  = document.getElementById(`f_batch_no_${i}`).value.trim();
    const qty = parseInt(document.getElementById(`f_batch_qty_${i}`).value) || 0;
    if (no) batches.push({ no, qty });
  }
  const batchTotal = batches.reduce((s, b) => s + b.qty, 0);
  const ratio = currentParams.transfer_ratio || 0;
  const salePrice = parseFloat(document.getElementById('f_sale_price').value) || 0;

  return {
    customer_name:     document.getElementById('f_customer_name').value.trim(),
    customer_code:     document.getElementById('f_customer_code').value.trim(),
    customer_order_no: document.getElementById('f_customer_order_no').value.trim(),
    remark:            document.getElementById('f_remark').value.trim(),
    xin_part_no:       document.getElementById('f_xin_part_no').value.trim(),
    ju_part_no:        document.getElementById('f_ju_part_no').value.trim(),
    part_name:         document.getElementById('f_part_name').value.trim(),
    qty:               parseInt(document.getElementById('f_qty').value) || 0,
    sale_price:        salePrice,
    transfer_ratio:    ratio,
    transfer_price:    Math.round(salePrice * ratio),
    delivery_date:     document.getElementById('f_delivery_date').value,
    ship_date:         document.getElementById('f_ship_date').value,
    month_first_day:   document.getElementById('f_month_first_day').value,
    cross_month:       document.getElementById('f_cross_month').value,
    invoice_date:      document.getElementById('f_invoice_date').value,
    invoice_no:        document.getElementById('f_invoice_no').value.trim(),
    invoice_type:      document.getElementById('f_invoice_type').value,
    batches,
    batch_total: batchTotal,
  };
}

function validateForm(data) {
  const errors = [];
  if (!data.customer_name)     errors.push('客戶名稱');
  if (!data.customer_order_no) errors.push('客戶單號');
  if (!data.xin_part_no)       errors.push('欣家豐品號');
  if (!data.qty)               errors.push('訂單數量');
  if (!data.sale_price)        errors.push('對外單價');
  if (!data.delivery_date)     errors.push('預交日');
  if (!data.ship_date)         errors.push('出貨日');
  if (!data.invoice_no)        errors.push('發票號碼');
  if (!validateBatch())        errors.push('批號合計 ≠ 訂單數量');
  return errors;
}

async function submitForm() {
  const data = getFormData();
  const errors = validateForm(data);
  if (errors.length) {
    showToast(`以下欄位未填或有誤：${errors.join('、')}`, 'error');
    return;
  }

  if (editingId) {
    // 修改
    const res = await apiFetch(`/api/records/${editingId}`, 'PUT', data);
    if (res.success) {
      showToast('✅ 修改已儲存', 'success');
      clearForm();
      loadRecords();
    } else {
      showToast('儲存失敗：' + (res.error || '未知錯誤'), 'error');
    }
  } else {
    // 新增
    const res = await apiFetch('/api/records', 'POST', data);
    if (res.success) {
      showToast(`✅ 新增成功：${res.record.txn_id}`, 'success');
      clearForm();
      loadRecords();
    } else {
      showToast('新增失敗：' + (res.error || '未知錯誤'), 'error');
    }
  }
}

  document.getElementById('f_ship_date').value         = r.ship_date || '';
  document.getElementById('f_month_first_day').value   = r.month_first_day || '';

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── 初始化 ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initBatchRows();
  loadMasterCache();   // 品號/客戶快取
  loadRecords();
  setInterval(loadRecords, 30000);
  setInterval(loadMasterCache, 120000); // 每2分鐘更新主檔快取
});
</script>
